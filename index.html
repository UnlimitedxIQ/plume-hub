<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plume Hub</title>
    <style>
      /* Pre-React splash. Renders the moment Electron paints the window,
         hides itself the second React hydrates. Prevents the brief "what
         am I looking at" flash of a blank zinc-950 window during startup. */
      html, body {
        margin: 0;
        padding: 0;
        background: #09090b;
        color: #d4d4d8;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        height: 100%;
        overflow: hidden;
      }
      #plume-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #09090b;
        z-index: 9999;
        /* Fades out once React removes the 'visible' class */
        transition: opacity 0.35s ease-out;
      }
      #plume-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #plume-splash .mark {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #22c55e;
      }
      #plume-splash .tag {
        font-size: 12px;
        color: #71717a;
      }
      #plume-splash .spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(34, 197, 94, 0.2);
        border-top-color: #22c55e;
        border-radius: 50%;
        animation: plume-spin 0.8s linear infinite;
      }
      @keyframes plume-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="plume-splash">
      <div class="mark">Plume Hub</div>
      <div class="spinner"></div>
      <div class="tag">Loading…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
